name: Build and Release Summarizer

on:
  push:
    tags:
      - 'v*'  # 触发规则：推送符合 'v*' 格式的标签时运行，比如 v1.0.0

jobs:
  build-and-release:
    runs-on: windows-latest  # 使用 Windows 环境

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # 使用 Python 3.11

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller  # 安装 PyInstaller

      # 使用 PyInstaller 构建项目
      - name: Build with PyInstaller
        run: |
          pyinstaller summarizer.spec

      # 打包构建产物为 zip 文件
      - name: Package build artifacts
        run: |
          cd dist
          Compress-Archive -Path summarizer\* -DestinationPath summarizer.zip

      # 上传构建产物到 GitHub Releases
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/summarizer.zip
          asset_name: summarizer.zip
          asset_content_type: application/zip
